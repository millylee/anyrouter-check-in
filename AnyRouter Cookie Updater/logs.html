<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>日志 - AnyRouter Cookie Updater</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 640px; height: 520px; padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px; color: #24292f; background: #f6f8fa;
    }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 2px solid #0969da; }
    h1 { font-size: 15px; color: #0969da; }
    .actions { display: flex; gap: 6px; }
    button { padding: 5px 10px; border: 1px solid #d0d7de; border-radius: 6px; font-size: 11px; cursor: pointer; background: #f6f8fa; color: #24292f; }
    button:hover { background: #eaeef2; }
    .btn-danger { background: #cf222e; color: #fff; border-color: transparent; }
    .btn-danger:hover { background: #a40e26; }
    .btn-primary { background: #0969da; color: #fff; border-color: transparent; }
    .btn-primary:hover { background: #0860ca; }
    .logs-container { height: 440px; overflow-y: auto; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 6px; }
    .log-entry { padding: 6px 8px; margin-bottom: 4px; border-radius: 4px; border-left: 3px solid #d0d7de; background: #f6f8fa; }
    .log-entry.INFO { border-left-color: #0969da; background: #ddf4ff; }
    .log-entry.SUCCESS { border-left-color: #2da44e; background: #dafbe1; }
    .log-entry.ERROR { border-left-color: #cf222e; background: #ffebe9; }
    .log-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .log-level { padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 700; color: #fff; }
    .log-level.INFO { background: #0969da; }
    .log-level.SUCCESS { background: #2da44e; }
    .log-level.ERROR { background: #cf222e; }
    .log-time { color: #8b949e; font-size: 10px; }
    .log-message { color: #24292f; margin-bottom: 2px; }
    .log-details { background: rgba(0,0,0,.04); padding: 4px 6px; border-radius: 3px; font-family: 'SF Mono', Monaco, monospace; font-size: 10px; color: #57606a; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto; }
    .empty { text-align: center; padding: 40px; color: #8b949e; }
    .empty-icon { font-size: 36px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 同步日志</h1>
    <div class="actions">
      <button class="btn-primary" id="refreshBtn">🔄 刷新</button>
      <button class="btn-danger" id="clearBtn">🗑️ 清空</button>
      <button id="backBtn">← 返回</button>
    </div>
  </div>
  <div class="logs-container" id="logsContainer">
    <div class="empty"><div class="empty-icon">📝</div>加载中...</div>
  </div>
  <script src="logs.js"></script>
</body>
</html>
